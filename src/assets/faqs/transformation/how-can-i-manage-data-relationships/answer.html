<p>Reference fields can be populated in several ways:</p>
<ul>
  <li>
    <p>Use the record ID directly if known.</p>
  </li>
  <li>
    <p>
      For Record Types, assign either the Developer Name or the
      ID.
    </p>
  </li>
  <li>
    <p>
      For objects with External IDs, map the External ID field.
    </p>
  </li>
  <li>
    <p>
      Use <code>VLOOKUP</code> to resolve the record ID by
      matching one or more fields.
    </p>
  </li>
</ul>
