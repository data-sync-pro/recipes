<p>
  Yes. Add <code>IsDeleted = TRUE</code> to your filters and include
  <code>ALL ROWS</code> in the query to return deleted records. In <b>Query Manager</b>, select the records and apply
  <strong>Mass Undelete</strong> to
  restore them in one step.
