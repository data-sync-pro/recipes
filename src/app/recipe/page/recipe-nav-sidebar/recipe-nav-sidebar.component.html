<!-- Mobile sidebar toggle button -->
<button
  type="button"
  class="sidebar-toggle-btn"
  (click)="toggleSidebar()"
  [attr.aria-expanded]="isSidebarOpen"
  aria-label="Toggle recipe list">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="3" y1="6" x2="21" y2="6"></line>
    <line x1="3" y1="12" x2="21" y2="12"></line>
    <line x1="3" y1="18" x2="21" y2="18"></line>
  </svg>
</button>

<div class="sidebar-backdrop" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>

<!-- Left Sidebar - Recipe List -->
<aside class="left-sidebar" [class.open]="isSidebarOpen">
  <div class="sidebar-sticky">
    <div class="sidebar-filter">
      <div class="filter-input-wrap" [class.has-value]="!!sidebarSearchQuery">
        <mat-icon class="filter-icon">search</mat-icon>
        <input
          #sidebarSearchInput
          type="text"
          class="filter-input"
          placeholder="Search…"
          [value]="sidebarSearchQuery"
          (input)="onSidebarSearchInput($any($event.target).value)"
          (keydown.escape)="clearFilter()"
          aria-label="Filter recipes" />
        <button *ngIf="sidebarSearchQuery; else kbdHint"
                class="filter-clear"
                type="button"
                (click)="clearFilter()"
                aria-label="Clear filter">
          <mat-icon>close</mat-icon>
        </button>
        <ng-template #kbdHint>
          <span class="filter-kbd" aria-hidden="true">/</span>
        </ng-template>
      </div>
    </div>
    <div class="category-list">
      <div *ngFor="let group of filteredCategoryGroups" class="category-group">
        <!-- Category Header -->
        <div
          class="category-header"
          (click)="toggleCategory(group.category.name)">
          <img
            class="chevron-down-icon"
            src="assets/icons/recipe/chevron-down.svg"
            [class.collapsed]="!group.isExpanded"
            aria-hidden="true">
          <span class="category-name">{{ group.category.displayName }}</span>
        </div>

        <!-- Recipe List (shown when expanded) -->
        <div class="recipe-list" *ngIf="group.isExpanded">
          <a
            *ngFor="let recipe of group.recipes"
            class="recipe-list-item"
            [class.active]="recipe.slug === activeRecipeSlug"
            [routerLink]="['/recipes', categorySlug(group.category.name), recipe.slug]"
            (click)="closeSidebar()">
            {{ recipe.title }}
          </a>
        </div>
      </div>
    </div>
  </div>
</aside>
