<div class="recipe-layout">
    <app-recipe-nav-sidebar
        [recipes]="allRecipes"
        [categories]="categories">
    </app-recipe-nav-sidebar>

    <app-recipe-list
        [recipes]="recipes"
        [categories]="categories"
        [searchQuery]="searchQuery"
        (searchChange)="onSearchChange($event)"
        (recipeSelect)="onRecipeSelect($event)"
        (openSearchOverlay)="onOpenSearchOverlay()">
    </app-recipe-list>
</div>
