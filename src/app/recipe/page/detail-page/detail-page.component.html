<!-- Detail Banner with Breadcrumb -->
<app-recipe-detail-banner
  [title]="currentRecipe?.title || 'Recipe Details'"
  [breadcrumbs]="breadcrumbs">
</app-recipe-detail-banner>

<div class="recipe-detail-page">
  <div class="detail-main-layout">
    <!-- Left Sidebar - Recipe List -->
    <aside class="left-sidebar">
      <div class="sidebar-sticky">
        <div class="sidebar-search">
          <img class="search-icon" src="assets/icons/recipe/search.svg" aria-hidden="true">
          <input
            #sidebarSearchInput
            type="text"
            placeholder="Search..."
            class="sidebar-search-input"
            (click)="openSearchOverlay()"
            (focus)="openSearchOverlay()"
            readonly>
          <span class="shortcut-hint">/</span>
        </div>
        <div class="category-list">
          <div *ngFor="let group of filteredCategoryGroups" class="category-group">
            <!-- Category Header -->
            <div
              class="category-header"
              (click)="toggleCategory(group.category.name)">
              <img
                class="chevron-down-icon"
                src="assets/icons/recipe/chevron-down.svg"
                [class.collapsed]="!group.isExpanded"
                aria-hidden="true">
              <span class="category-name">{{ group.category.displayName }}</span>
            </div>

            <!-- Recipe List (shown when expanded) -->
            <div class="recipe-list" *ngIf="group.isExpanded">
              <div
                *ngFor="let recipe of group.recipes"
                class="recipe-list-item"
                [class.active]="recipe.slug === currentRecipe?.slug"
                [routerLink]="['/recipes', group.category.name, recipe.slug]">
                {{ recipe.title }}
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Middle Content Area -->
    <main class="detail-content">
      <!-- Section order is controlled by SECTION_CONFIG in the component -->
      <div class="content-sections" *ngIf="currentRecipe">
        <ng-container *ngFor="let section of visibleSections">
          <section [id]="section.id" class="content-section">
            <h2 class="recipe-section-title">{{ section.label }}</h2>

            <ng-container [ngSwitch]="section.templateRef">
              <!-- Overview Section -->
              <ng-container *ngSwitchCase="'overview'">
                <div class="section-content">
                  <div [innerHTML]="currentRecipe.overview | codeBlock"></div>
                </div>
              </ng-container>

              <!-- General Use Case Section -->
              <ng-container *ngSwitchCase="'useCase'">
                <!-- Single item: display as paragraph -->
                <div class="section-content" *ngIf="getGeneralUseCaseItems().length === 1" [innerHTML]="getGeneralUseCaseItems()[0] | codeBlock">
                </div>
                <!-- Multiple items: display as list -->
                <ul class="use-case-list" *ngIf="getGeneralUseCaseItems().length > 1">
                  <li *ngFor="let item of getGeneralUseCaseItems()" [innerHTML]="item | codeBlock"></li>
                </ul>
              </ng-container>

              <!-- Download Executable File Section -->
              <ng-container *ngSwitchCase="'downloadFile'">
                <a
                  *ngFor="let file of currentRecipe.downloadableExecutables"
                  class="download-item"
                  [href]="getDownloadUrl(file)"
                  [download]="getDownloadFileName(file)">
                  <img class="download-icon" src="assets/icons/download.svg" alt="Download">
                  <span class="download-title">{{ getDownloadDisplayName(file) }}</span>
                </a>
              </ng-container>

              <!-- Video Demo Section -->
              <ng-container *ngSwitchCase="'videoDemo'">
                <div class="section-content">
                  <div class="videos">
                    <div *ngFor="let video of getYouTubeVideosFromGeneralImages()" class="video-item">
                      <iframe
                        [src]="getYouTubeEmbedUrl(video.url)"
                        class="video youtube-embed"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                      </iframe>
                    </div>
                  </div>
                </div>
              </ng-container>

              <!-- Direction Section -->
              <ng-container *ngSwitchCase="'direction'">
                <div class="section-content">{{ currentRecipe.direction }}</div>
              </ng-container>

              <!-- Pipeline Section -->
              <ng-container *ngSwitchCase="'pipeline'">
                <div class="section-content">{{ currentRecipe.pipeline }}</div>
              </ng-container>

              <!-- Walkthrough Section -->
              <ng-container *ngSwitchCase="'walkthrough'">
                <div *ngFor="let step of currentRecipe.walkthrough; let i = index"
                     [id]="'walkthrough-step-' + (i + 1)"
                     class="walkthrough-step">
                  <div class="step-header">
                    <div class="step-number-badge">{{ i + 1 }}</div>
                    <h3 class="step-title">{{ step.step }}</h3>
                  </div>

                  <!-- Step Media -->
                  <div class="step-media" *ngIf="step.media && step.media.length > 0">
                    <div *ngFor="let media of step.media" class="media-item">
                      <img
                        *ngIf="media.type === 'image' || media.type === 'gif'"
                        [src]="media.displayUrl || media.url"
                        [alt]="media.alt"
                        class="step-image"
                        (click)="openMediaPreview(media)">
                      <video
                        *ngIf="media.type === 'video'"
                        [src]="media.displayUrl || media.url"
                        controls
                        class="step-video clickable"
                        (click)="openMediaPreview(media)">
                        Your browser does not support the video tag.
                      </video>
                    </div>
                  </div>
                </div>
              </ng-container>
            </ng-container>
          </section>
        </ng-container>

        <!-- Verification GIF Section (temporarily hidden - videos moved to overview) -->
        <!-- <section id="verification-gif" class="content-section" *ngIf="(currentRecipe.verificationGIF && currentRecipe.verificationGIF.length > 0) || getYouTubeVideosFromGeneralImages().length > 0">

      </div>

      <!-- Loading State -->
      <div class="loading-state" *ngIf="!currentRecipe">
        <p>Loading recipe...</p>
      </div>
    </main>

    <!-- Right Sidebar - TOC -->
    <aside class="right-toc">
      <div class="toc-sticky">
        <nav class="toc-nav" *ngIf="tocItems.length > 0">
          <ng-container *ngFor="let item of tocItems">
            <a [href]="'#' + item.id"
               class="toc-link"
               [class.active]="activeTocSection === item.id"
               (click)="scrollToSection($event, item.id)">
              {{ item.label }}
            </a>
            <!-- Sub-items (e.g., walkthrough steps) -->
            <ng-container *ngIf="item.children && item.children.length > 0">
              <a *ngFor="let child of item.children"
                 [href]="'#' + child.id"
                 class="toc-link toc-child"
                 [class.active]="activeTocSection === child.id"
                 (click)="scrollToSection($event, child.id)">
                {{ child.label }}
              </a>
            </ng-container>
          </ng-container>
        </nav>
      </div>
    </aside>
  </div>

  <!-- Media Preview Modal -->
  <div class="media-modal-overlay" *ngIf="isMediaModalOpen" (click)="closeMediaPreview()">
    <div class="media-modal-container">
      <button class="modal-close-btn" (click)="closeMediaPreview()" aria-label="Close preview">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="media-modal-content">
        <img
          *ngIf="previewMedia && (previewMedia.type === 'image' || previewMedia.type === 'gif')"
          [src]="previewMedia.url"
          [alt]="previewMedia.alt"
          class="modal-media">
        <video
          *ngIf="previewMedia && previewMedia.type === 'video'"
          [src]="previewMedia.url"
          controls
          autoplay
          class="modal-media">
          Your browser does not support the video tag.
        </video>
      </div>
    </div>
  </div>

  <!-- Search Overlay -->
  <app-recipe-search-overlay
    *ngIf="isSearchOverlayOpen"
    [isOpen]="isSearchOverlayOpen"
    (closed)="closeSearchOverlay()"
    (selectedResult)="handleSearchSelect($event)">
  </app-recipe-search-overlay>
</div>
