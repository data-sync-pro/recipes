  <div class="setup-main-layout">
    <!-- Left Sidebar - Setup Titles -->
    <aside class="left-sidebar">
      <div class="sidebar-sticky">
        <div class="sidebar-header">
          <span class="sidebar-label">User Manual</span>
          <span class="sidebar-count">{{ totalPageCount }} pages</span>
        </div>

        <div class="sidebar-filter">
          <div class="filter-input-wrap" [class.has-value]="!!filterQuery">
            <mat-icon class="filter-icon">search</mat-icon>
            <input
              #filterInput
              type="text"
              class="filter-input"
              placeholder="Filter user manual pages…"
              [value]="filterQuery"
              (input)="onFilterChange($any($event.target).value)"
              (keydown.escape)="clearFilter()"
              aria-label="Filter setup pages" />
            <button *ngIf="filterQuery; else kbdHint"
                    class="filter-clear"
                    type="button"
                    (click)="clearFilter()"
                    aria-label="Clear filter">
              <mat-icon>close</mat-icon>
            </button>
            <ng-template #kbdHint>
              <span class="filter-kbd" aria-hidden="true">/</span>
            </ng-template>
          </div>
        </div>

        <nav class="category-list" aria-label="Setup navigation">
          <ng-container *ngFor="let node of navTree; trackBy: trackByNodeId">
            <ng-container *ngTemplateOutlet="navNodeTemplate; context: { $implicit: node, level: 0 }"></ng-container>
          </ng-container>
          <div class="filter-empty" *ngIf="filterQuery && !hasAnyMatch">
            <mat-icon>search_off</mat-icon>
            <p>No pages match &ldquo;{{ filterQuery }}&rdquo;</p>
          </div>
        </nav>
      </div>
    </aside>

    <!-- Recursive template for nav nodes -->
    <ng-template #navNodeTemplate let-node let-level="level">
      <div class="nav-node"
           *ngIf="isNodeVisible(node)"
           [class.level-0]="level === 0"
           [class.level-1]="level === 1"
           [class.level-2]="level === 2"
           [class.level-3]="level >= 3">
        <div class="nav-item"
             [class.active]="isActive(node)"
             [class.in-path]="isInActivePath(node) && !isActive(node)"
             [class.has-children]="node.children?.length"
             (click)="onNodeClick(node)"
             [attr.aria-current]="isActive(node) ? 'page' : null"
             [attr.aria-expanded]="node.children?.length ? isExpanded(node) : null">
          <span class="chevron-slot"
                (click)="node.children?.length && toggleExpand(node, $event)"
                [attr.role]="node.children?.length ? 'button' : null"
                [attr.aria-label]="node.children?.length ? (isExpanded(node) ? 'Collapse' : 'Expand') : null">
            <mat-icon *ngIf="node.children?.length" class="expand-icon">
              {{ isExpanded(node) ? 'expand_more' : 'chevron_right' }}
            </mat-icon>
          </span>
          <span class="nav-label">{{ node.label }}</span>
        </div>
        <!-- Children -->
        <div class="nav-children"
             *ngIf="node.children?.length && isExpanded(node)"
             [class.has-active]="branchHasActive(node)">
          <ng-container *ngFor="let child of node.children; trackBy: trackByNodeId">
            <ng-container *ngTemplateOutlet="navNodeTemplate; context: { $implicit: child, level: level + 1 }"></ng-container>
          </ng-container>
        </div>
      </div>
    </ng-template>

    <!-- Main Content -->
    <main class="setup-content">
      <div *ngIf="isLoading" class="setup-loading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <ng-container *ngIf="!isLoading && currentSetup">
        <h1 class="page-title">{{ currentSetup.title }}</h1>
        <app-setup-block
          *ngFor="let block of currentSetup.blocks; trackBy: trackByIndex"
          [block]="block">
        </app-setup-block>

        <!-- Lightning Web Components cards -->
        <app-setup-card
          *ngIf="showLwcCards"
          [cards]="lwcCards"
          (cardClick)="onCardClick($event)">
        </app-setup-card>
      </ng-container>

      <div *ngIf="!isLoading && !currentSetup" class="setup-empty">
        <mat-icon>info_outline</mat-icon>
        <p>Select a setup guide from the sidebar.</p>
      </div>
    </main>
